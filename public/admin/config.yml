# Decap CMS configuration (disabled until /admin/index.html is added)
# See: https://decapcms.org/docs/configuration-options/

backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

locale: da

collections:
  - name: pages
    label: Pages
    folder: content/pages
    format: yaml-frontmatter
    extension: md
    create: false
    slug: "{{fields.slug}}.{{fields.locale}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Locale, name: locale, widget: select, options: ["da", "en"] }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Eyebrow, name: eyebrow, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: menu
    label: Menu sections
    folder: content/menu
    format: yaml-frontmatter
    extension: md
    create: true
    slug: "{{fields.slug}}.{{fields.locale}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string, hint: "e.g. 01-food (controls order)" }
      - { label: Locale, name: locale, widget: select, options: ["da", "en"] }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - label: Items
        name: items
        widget: list
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Price (DKK), name: price, widget: number, required: false, value_type: int }
          - { label: Tags, name: tags, widget: list, required: false, default: [] }

  - name: tastings
    label: Menu teaser
    folder: content/tastings
    format: yaml-frontmatter
    extension: md
    create: true
    slug: "{{fields.slug}}.{{fields.locale}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string, hint: "e.g. menu" }
      - { label: Locale, name: locale, widget: select, options: ["da", "en"] }
      - { label: Eyebrow, name: eyebrow, widget: string, required: false }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Note, name: note, widget: text, required: false }
      - label: Groups
        name: groups
        widget: list
        fields:
          - { label: Name, name: name, widget: string }
          - label: Items
            name: items
            widget: list
            field: { label: Preparation, name: preparation, widget: string }

  - name: reception
    label: Opening reception
    folder: content/reception
    format: yaml-frontmatter
    extension: md
    create: true
    slug: "{{fields.slug}}.{{fields.locale}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string, hint: "keep as 'reception'" }
      - { label: Locale, name: locale, widget: select, options: ["da", "en"] }
      - { label: Eyebrow, name: eyebrow, widget: string, required: false }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Date label, name: dateLabel, widget: string, hint: "e.g. Lørdag den 20. juni 2026" }
      - { label: Time label, name: timeLabel, widget: string, hint: "e.g. Kl. 11.00 – 15.00" }
      - { label: Start (ISO), name: startDate, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", hint: "for search engines" }
      - { label: End (ISO), name: endDate, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", hint: "for search engines" }
      - { label: Closing line, name: closing, widget: string, required: false, hint: "e.g. Vi ses den 20. juni!" }
      - { label: Body, name: body, widget: markdown }

  - name: wine
    label: Wine list
    files:
      - name: card
        label: Wine card
        file: content/wine/card.md
        format: yaml-frontmatter
        extension: md
        fields:
          - label: Sections
            name: sections
            widget: list
            fields:
              - { label: ID, name: id, widget: string, hint: "e.g. red, white (controls order)" }
              - label: Label
                name: label
                widget: object
                fields:
                  - { label: Danish, name: da, widget: string }
                  - { label: English, name: en, widget: string }
              - label: Note
                name: note
                widget: object
                required: false
                fields:
                  - { label: Danish, name: da, widget: string }
                  - { label: English, name: en, widget: string }
              - label: Groups
                name: groups
                widget: list
                fields:
                  - label: Region / heading
                    name: label
                    widget: object
                    required: false
                    fields:
                      - { label: Danish, name: da, widget: string }
                      - { label: English, name: en, widget: string }
                  - label: Wines
                    name: wines
                    widget: list
                    fields:
                      - { label: Name, name: name, widget: string }
                      - { label: Glass price (DKK), name: glass, widget: number, required: false, value_type: int }
                      - { label: Bottle price (DKK), name: bottle, widget: number, required: false, value_type: int }
                      - { label: Few bottles left, name: limited, widget: boolean, default: false }

  - name: settings
    label: Site settings
    files:
      - name: site
        label: Site info
        file: content/settings/site.md
        format: yaml-frontmatter
        extension: md
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Founded year, name: foundedYear, widget: number, value_type: int }
          - label: Address
            name: address
            widget: object
            fields:
              - { label: Street address, name: streetAddress, widget: string }
              - { label: Floor / door, name: addressDetail, widget: string, required: false, hint: "e.g. st. th." }
              - { label: Locality, name: locality, widget: string }
              - { label: Postal code, name: postalCode, widget: string }
              - { label: Country (ISO), name: country, widget: string }
              - { label: Region, name: region, widget: string, required: false }
          - { label: CVR, name: cvr, widget: string, required: false }
          - label: Geo
            name: geo
            widget: object
            required: false
            fields:
              - { label: Latitude, name: latitude, widget: number }
              - { label: Longitude, name: longitude, widget: number }
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Booking URL, name: bookingUrl, widget: string }
          - label: Social
            name: social
            widget: object
            fields:
              - { label: Instagram URL, name: instagram, widget: string, required: false }
              - { label: Facebook URL, name: facebook, widget: string, required: false }
          - label: Trustpilot
            name: trustpilot
            widget: object
            required: false
            fields:
              - { label: Review page URL, name: url, widget: string }
              - { label: TrustScore (0–5), name: score, widget: number, value_type: float, min: 0, max: 5, step: 0.1, hint: "Fallback only — used until Business Unit ID is set" }
              - { label: Review count, name: reviewCount, widget: number, required: false, value_type: int }
              - { label: Business Unit ID, name: businessUnitId, widget: string, required: false, hint: "From Trustpilot Business → Integrations. When set, shows the live official badge." }
          - label: Tagline
            name: tagline
            widget: object
            fields:
              - { label: Danish, name: da, widget: string }
              - { label: English, name: en, widget: string }
          - label: In the glass now
            name: currentPour
            widget: object
            required: false
            fields:
              - { label: Danish, name: da, widget: string }
              - { label: English, name: en, widget: string }

      - name: hours
        label: Opening hours
        file: content/settings/hours.md
        format: yaml-frontmatter
        extension: md
        fields:
          - label: Services
            name: services
            widget: list
            fields:
              - label: Name
                name: name
                widget: object
                fields:
                  - { label: Danish, name: da, widget: string }
                  - { label: English, name: en, widget: string }
              - label: Schedule
                name: schedule
                widget: list
                fields:
                  - label: Days
                    name: days
                    widget: list
                    default: []
                  - label: Ranges
                    name: ranges
                    widget: list
                    fields:
                      - { label: Opens, name: opens, widget: string }
                      - { label: Closes, name: closes, widget: string }
          - label: Notes
            name: notes
            widget: object
            required: false
            fields:
              - { label: Danish, name: da, widget: string }
              - { label: English, name: en, widget: string }
